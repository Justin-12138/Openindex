<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
    <h1>Markdown & Math Test</h1>

    <div id="test-content">
        <h2>测试内容：</h2>
        <div id="markdown-output"></div>
    </div>

    <script type="module">
        import MarkdownIt from 'https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/+esm';
        import markdownItKatex from 'https://cdn.jsdelivr.net/npm/markdown-it-katex@2.1.0/+esm';

        // 测试 Markdown 内容
        const testContent = `
# 标题测试

这是一个**加粗文本**和*斜体文本*的示例。

## 列表测试

- 无序列表项1
- 无序列表项2

1. 有序列表项1
2. 有序列表项2

## 代码测试

行内代码：\`console.log('hello')\`

代码块：
\`\`\`javascript
function hello() {
    console.log('Hello World!');
}
\`\`\`

## 数学公式测试

行内公式：$E = mc^2$

块级公式：
$$
\\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}
$$

## 表格测试

| 列1 | 列2 | 列3 |
|-----|-----|-----|
| A   | B   | C   |
| 1   | 2   | 3   |

## 引用测试

> 这是一个引用块
> 可以包含多行内容

## 链接测试

[百度](https://www.baidu.com)
        `;

        // 初始化 Markdown 渲染器
        const md = new MarkdownIt({
            html: true,
            linkify: true,
            typographer: true,
            breaks: true,
        });

        // 配置 KaTeX
        md.use(markdownItKatex.default || markdownItKatex, {
            throwOnError: false,
            errorColor: '#cc0000',
            displayMode: false,
        });

        // 渲染内容
        try {
            const html = md.render(testContent);
            document.getElementById('markdown-output').innerHTML = html;
            console.log('Markdown rendered successfully');
        } catch (error) {
            console.error('Markdown rendering failed:', error);
            document.getElementById('markdown-output').innerHTML = '<p style="color: red;">渲染失败: ' + error.message + '</p>';
        }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        #markdown-output {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            background: #f9f9f9;
        }

        h1, h2, h3, h4, h5, h6 {
            color: #333;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        code {
            background: #f1f1f1;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Monaco', monospace;
        }

        pre {
            background: #f1f1f1;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }

        blockquote {
            border-left: 3px solid #007acc;
            padding-left: 12px;
            color: #666;
            font-style: italic;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background: #f5f5f5;
        }
    </style>
</body>
</html>
